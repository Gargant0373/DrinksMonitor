# docker-compose.prod.yml — PRODUCTION
# Caddy handles HTTPS automatically via Let's Encrypt.
# Requires DOMAIN set in .env (see .env.example).
# Usage: ./scripts/start [--build]

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    volumes:
      - db_data:/app/data
    environment:
      DATABASE: /app/data/drinks_game.db
      FLASK_ENV: production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data           # TLS certs + OCSP staples (persisted)
      - caddy_config:/config       # Caddy config cache
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  db_data:
  caddy_data:
  caddy_config:
