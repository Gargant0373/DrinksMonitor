# docker-compose.prod.yml — PRODUCTION
# nginx on the host handles TLS via Certbot (Let's Encrypt).
# Backend is exposed on host port 5001, frontend on 3003.
# nginx proxies drinks.gargant.dev → these ports.
# Usage: ./scripts/start [--build]

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:5001:5000"   # only loopback — nginx proxies from outside
    volumes:
      - db_data:/app/data
    environment:
      DATABASE: /app/data/drinks_game.db
      FLASK_ENV: production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    ports:
      - "127.0.0.1:3003:80"     # only loopback — nginx proxies from outside
    restart: unless-stopped

volumes:
  db_data:
