# docker-compose.yml — LOCAL
# Hot-reload, plain HTTP on :80 via Caddy, SQLite on a named volume.
# Usage: ./scripts/start --local [--build]

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    volumes:
      - ./backend:/app          # live reload via Flask debug mode
      - db_data:/app/data
    environment:
      DATABASE: /app/data/drinks_game.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    volumes:
      - ./frontend:/app         # HMR
      - /app/node_modules       # keep container modules isolated
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  db_data:
